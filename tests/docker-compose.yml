services:
  node:
    build: .
    volumes:
      - ../:/repo:delegated
    working_dir: /repo/tests/codeceptjs
    command: npm run serve-test
    ports:
      - '9100:9001'
    expose:
      - '9001'
  firefox:
    image: seleniarm/standalone-firefox:latest
    depends_on:
      - node
    ports:
      - '4444'
      - '9059:7900'
    shm_size: '2gb'
  chrome:
    image: seleniarm/standalone-chromium:latest
    depends_on:
      - node
    ports:
      - '4444'
      - '9060:7900'
    shm_size: '2gb'
